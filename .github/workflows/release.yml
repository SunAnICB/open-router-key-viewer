name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Compute uv cache key
        id: uv-cache-key
        shell: bash
        run: |
          awk '
            /^\[\[package\]\]$/ { in_root = 0; print; next }
            $0 == "name = \"open-router-key-viewer\"" { in_root = 1; print; next }
            in_root && /^version = / { next }
            { print }
          ' uv.lock > uv.lock.cachekey
          echo "hash=$(sha256sum uv.lock.cachekey | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache uv downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-python-3.13-uv-${{ steps.uv-cache-key.outputs.hash }}
          restore-keys: |
            ${{ runner.os }}-python-3.13-uv-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            imagemagick \
            libegl1 \
            libegl-mesa0 \
            libgl1 \
            libgl1-mesa-dri \
            libxcb-cursor0 \
            libxkbcommon-x11-0

      - name: Verify Qt runtime dependencies
        run: |
          ldconfig -p | grep -E 'libEGL\.so\.1|libGL\.so\.1|libxcb-cursor\.so\.0|libxkbcommon-x11\.so\.0' || true

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: uv run pytest

      - name: Build release binary
        run: ./scripts/release.sh

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/open-router-key-viewer
          generate_release_notes: true
          fail_on_unmatched_files: true
